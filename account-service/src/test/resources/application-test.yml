spring:
  datasource:
    url: jdbc:tc:postgresql:17:///accountdb
    driver-class-name: org.testcontainers.jdbc.ContainerDatabaseDriver
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
  flyway:
    enabled: true
    locations: classpath:db/migration

# Suppress startup banner noise in test output
logging:
  level:
    org.flywaydb: WARN
    org.hibernate: WARN
    org.testcontainers: WARN
    com.zaxxer.hikari: WARN
