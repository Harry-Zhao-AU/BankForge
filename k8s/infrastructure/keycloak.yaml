apiVersion: v1
kind: Secret
metadata:
  name: keycloak-secret
  namespace: bankforge
stringData:
  admin-password: "admin"
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: keycloak-realm-config
  namespace: bankforge
data:
  bankforge-realm.json: |
    {
      "realm": "bankforge",
      "enabled": true,
      "sslRequired": "none",
      "registrationAllowed": false,
      "verifyEmail": false,
      "loginWithEmailAllowed": false,
      "accessTokenLifespan": 300,
      "ssoSessionMaxLifespan": 1800,
      "requiredActions": [
        {
          "alias": "VERIFY_PROFILE",
          "name": "Verify Profile",
          "providerId": "VERIFY_PROFILE",
          "enabled": true,
          "defaultAction": false,
          "priority": 90,
          "config": {}
        },
        {
          "alias": "VERIFY_EMAIL",
          "name": "Verify Email",
          "providerId": "VERIFY_EMAIL",
          "enabled": true,
          "defaultAction": false,
          "priority": 50,
          "config": {}
        },
        {
          "alias": "UPDATE_PASSWORD",
          "name": "Update Password",
          "providerId": "UPDATE_PASSWORD",
          "enabled": true,
          "defaultAction": false,
          "priority": 30,
          "config": {}
        }
      ],
      "clients": [
        {
          "clientId": "kong",
          "enabled": true,
          "protocol": "openid-connect",
          "publicClient": false,
          "secret": "kong-client-secret",
          "standardFlowEnabled": false,
          "directAccessGrantsEnabled": true,
          "attributes": {
            "access.token.signed.response.alg": "RS256"
          }
        },
        {
          "clientId": "bankforge-app",
          "enabled": true,
          "protocol": "openid-connect",
          "publicClient": true,
          "standardFlowEnabled": true,
          "directAccessGrantsEnabled": false,
          "redirectUris": ["http://localhost:3001/*"],
          "webOrigins": ["http://localhost:3001"]
        }
      ],
      "users": [
        {
          "username": "testuser",
          "email": "testuser@bankforge.local",
          "firstName": "Test",
          "lastName": "User",
          "enabled": true,
          "emailVerified": true,
          "requiredActions": [],
          "credentials": [
            {
              "type": "password",
              "value": "password",
              "temporary": false
            }
          ],
          "realmRoles": ["ROLE_CUSTOMER"]
        },
        {
          "username": "adminuser",
          "email": "adminuser@bankforge.local",
          "firstName": "Admin",
          "lastName": "User",
          "enabled": true,
          "emailVerified": true,
          "requiredActions": [],
          "credentials": [
            {
              "type": "password",
              "value": "password",
              "temporary": false
            }
          ],
          "realmRoles": ["ROLE_ADMIN"]
        }
      ],
      "roles": {
        "realm": [
          {"name": "ROLE_CUSTOMER"},
          {"name": "ROLE_ADMIN"}
        ]
      }
    }
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: keycloak
  namespace: bankforge
spec:
  replicas: 1
  selector:
    matchLabels:
      app: keycloak
  template:
    metadata:
      labels:
        app: keycloak
    spec:
      containers:
        - name: keycloak
          image: quay.io/keycloak/keycloak:26.6.1
          args: ["start-dev", "--import-realm"]
          env:
            - name: KC_BOOTSTRAP_ADMIN_USERNAME
              value: "admin"
            - name: KC_BOOTSTRAP_ADMIN_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: keycloak-secret
                  key: admin-password
            - name: KC_PROXY_HEADERS
              value: "xforwarded"
            - name: KC_HTTP_ENABLED
              value: "true"
            - name: KC_HOSTNAME_STRICT
              value: "false"
            - name: KC_HOSTNAME
              value: "http://keycloak.bankforge.svc.cluster.local:8080"
          ports:
            - containerPort: 8080
          readinessProbe:
            httpGet:
              path: /realms/bankforge
              port: 8080
            initialDelaySeconds: 30
            periodSeconds: 10
            failureThreshold: 6
          resources:
            requests:
              cpu: "500m"
              memory: "768Mi"
            limits:
              cpu: "2000m"
              memory: "1Gi"
          volumeMounts:
            - name: realm-config
              mountPath: /opt/keycloak/data/import
      volumes:
        - name: realm-config
          configMap:
            name: keycloak-realm-config
---
apiVersion: v1
kind: Service
metadata:
  name: keycloak
  namespace: bankforge
spec:
  selector:
    app: keycloak
  ports:
    - port: 8080
      targetPort: 8080
