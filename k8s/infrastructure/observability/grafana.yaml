apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-datasources
  namespace: bankforge
data:
  datasources.yaml: |
    apiVersion: 1
    datasources:
      - name: Prometheus
        type: prometheus
        uid: prometheus
        access: proxy
        url: http://prometheus:9090
        isDefault: true
        jsonData:
          httpMethod: POST
          exemplarTraceIdDestinations:
            - datasourceUid: jaeger
              name: traceID

      - name: Jaeger
        type: jaeger
        uid: jaeger
        access: proxy
        url: http://jaeger:16686

      - name: Loki
        type: loki
        uid: loki
        access: proxy
        url: http://loki:3100
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-dashboards-provider
  namespace: bankforge
data:
  dashboards-provider.yaml: |
    apiVersion: 1
    providers:
      - name: 'bankforge'
        orgId: 1
        folder: 'BankForge'
        type: file
        options:
          path: /etc/grafana/provisioning/dashboards
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-banking-dashboard
  namespace: bankforge
data:
  banking-dashboard.json: |
    {
      "annotations": { "list": [] },
      "editable": true,
      "fiscalYearStartMonth": 0,
      "graphTooltip": 0,
      "id": null,
      "links": [],
      "panels": [
        {
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "fieldConfig": {
            "defaults": {
              "color": { "mode": "palette-classic" },
              "custom": { "drawStyle": "line", "lineInterpolation": "smooth", "fillOpacity": 10, "pointSize": 5, "showPoints": "auto", "lineWidth": 2, "spanNulls": false },
              "unit": "ops"
            },
            "overrides": []
          },
          "gridPos": { "h": 8, "w": 8, "x": 0, "y": 0 },
          "id": 1,
          "options": { "legend": { "calcs": [], "displayMode": "list", "placement": "bottom", "showLegend": true }, "tooltip": { "mode": "single", "sort": "none" } },
          "targets": [{ "datasource": { "type": "prometheus", "uid": "prometheus" }, "exemplar": true, "expr": "rate(transfer_initiated_total{state=~\"CONFIRMED|PENDING\"}[1m])", "legendFormat": "{{state}}", "refId": "A" }],
          "title": "Transfer Volume (per minute)",
          "type": "timeseries"
        },
        {
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "fieldConfig": {
            "defaults": {
              "color": { "mode": "palette-classic" },
              "custom": { "drawStyle": "line", "lineInterpolation": "smooth", "fillOpacity": 10, "pointSize": 5, "showPoints": "auto", "lineWidth": 2, "spanNulls": false },
              "unit": "ms"
            },
            "overrides": []
          },
          "gridPos": { "h": 8, "w": 8, "x": 8, "y": 0 },
          "id": 2,
          "options": { "legend": { "calcs": [], "displayMode": "list", "placement": "bottom", "showLegend": true }, "tooltip": { "mode": "single", "sort": "none" } },
          "targets": [{ "datasource": { "type": "prometheus", "uid": "prometheus" }, "exemplar": true, "expr": "histogram_quantile(0.99, rate(transfer_duration_milliseconds_bucket{service=\"payment-service\"}[5m]))", "legendFormat": "p99", "refId": "A" }],
          "title": "Transfer Latency p99 (ms)",
          "type": "timeseries"
        },
        {
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "fieldConfig": {
            "defaults": {
              "color": { "mode": "palette-classic" },
              "custom": { "drawStyle": "line", "lineInterpolation": "smooth", "fillOpacity": 10, "pointSize": 5, "showPoints": "auto", "lineWidth": 2, "spanNulls": false },
              "unit": "ops"
            },
            "overrides": []
          },
          "gridPos": { "h": 8, "w": 8, "x": 16, "y": 0 },
          "id": 3,
          "options": { "legend": { "calcs": [], "displayMode": "list", "placement": "bottom", "showLegend": true }, "tooltip": { "mode": "single", "sort": "none" } },
          "targets": [{ "datasource": { "type": "prometheus", "uid": "prometheus" }, "exemplar": true, "expr": "rate(transfer_dlt_messages_total{service=\"payment-service\"}[1m])", "legendFormat": "{{service}}", "refId": "A" }],
          "title": "Error Rate (DLT Messages per minute)",
          "type": "timeseries"
        }
      ],
      "schemaVersion": 39,
      "tags": ["bankforge", "observability"],
      "templating": { "list": [] },
      "time": { "from": "now-15m", "to": "now" },
      "timepicker": {},
      "timezone": "browser",
      "title": "Banking Overview",
      "uid": "bankforge-banking-overview",
      "version": 1
    }
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: grafana
  namespace: bankforge
spec:
  replicas: 1
  selector:
    matchLabels:
      app: grafana
  template:
    metadata:
      labels:
        app: grafana
    spec:
      containers:
        - name: grafana
          image: grafana/grafana:11.6.14
          env:
            - name: GF_AUTH_ANONYMOUS_ENABLED
              value: "true"
            - name: GF_AUTH_ANONYMOUS_ORG_ROLE
              value: "Admin"
            - name: GF_AUTH_DISABLE_LOGIN_FORM
              value: "true"
          ports:
            - containerPort: 3000
          readinessProbe:
            httpGet:
              path: /api/health
              port: 3000
            initialDelaySeconds: 15
            periodSeconds: 5
          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
            limits:
              cpu: "500m"
              memory: "256Mi"
          volumeMounts:
            - name: datasources
              mountPath: /etc/grafana/provisioning/datasources/datasources.yaml
              subPath: datasources.yaml
            - name: dashboards-provider
              mountPath: /etc/grafana/provisioning/dashboards/dashboards-provider.yaml
              subPath: dashboards-provider.yaml
            - name: banking-dashboard
              mountPath: /etc/grafana/provisioning/dashboards/banking-dashboard.json
              subPath: banking-dashboard.json
      volumes:
        - name: datasources
          configMap:
            name: grafana-datasources
        - name: dashboards-provider
          configMap:
            name: grafana-dashboards-provider
        - name: banking-dashboard
          configMap:
            name: grafana-banking-dashboard
---
apiVersion: v1
kind: Service
metadata:
  name: grafana
  namespace: bankforge
spec:
  selector:
    app: grafana
  ports:
    - port: 3000
      targetPort: 3000
