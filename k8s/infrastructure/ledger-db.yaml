apiVersion: v1
kind: Service
metadata:
  name: ledger-db
  namespace: bankforge
spec:
  selector:
    app: ledger-db
  ports:
    - port: 5432
      targetPort: 5432
  clusterIP: None
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: ledger-db
  namespace: bankforge
spec:
  serviceName: ledger-db
  replicas: 1
  selector:
    matchLabels:
      app: ledger-db
  template:
    metadata:
      labels:
        app: ledger-db
    spec:
      containers:
        - name: postgres
          image: postgres:17-alpine
          args:
            - postgres
            - -c
            - wal_level=logical
            - -c
            - max_replication_slots=5
            - -c
            - max_wal_senders=5
          env:
            - name: POSTGRES_DB
              value: ledgerdb
            - name: POSTGRES_USER
              value: ledger
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: ledger-db-secret
                  key: password
          ports:
            - containerPort: 5432
          readinessProbe:
            exec:
              command: [pg_isready, -U, ledger, -d, ledgerdb]
            initialDelaySeconds: 10
            periodSeconds: 5
            failureThreshold: 6
          resources:
            requests:
              cpu: "250m"
              memory: "256Mi"
            limits:
              cpu: "1000m"
              memory: "512Mi"
          volumeMounts:
            - name: data
              mountPath: /var/lib/postgresql/data
      volumes:
        - name: data
          emptyDir: {}
