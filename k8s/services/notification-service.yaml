apiVersion: v1
kind: ConfigMap
metadata:
  name: notification-service-config
  namespace: bankforge
data:
  SPRING_KAFKA_BOOTSTRAP_SERVERS: "kafka:9092"
  OTEL_EXPORTER_OTLP_ENDPOINT: "http://otel-collector:4318"
  LOG_AUSTRAC_PATH: "/tmp/austrac-audit.log"
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: notification-service
  namespace: bankforge
spec:
  replicas: 1
  selector:
    matchLabels:
      app: notification-service
  template:
    metadata:
      labels:
        app: notification-service
    spec:
      containers:
        - name: notification-service
          image: ghcr.io/harry-zhao-au/bankforge-notification-service:latest
          imagePullPolicy: Always
          envFrom:
            - configMapRef:
                name: notification-service-config
          ports:
            - containerPort: 8080
          readinessProbe:
            httpGet:
              path: /actuator/health
              port: 8080
            initialDelaySeconds: 45
            periodSeconds: 10
            failureThreshold: 6
          livenessProbe:
            httpGet:
              path: /actuator/health
              port: 8080
            initialDelaySeconds: 60
            periodSeconds: 15
            failureThreshold: 4
          resources:
            requests:
              cpu: "250m"
              memory: "512Mi"
            limits:
              cpu: "1000m"
              memory: "1Gi"
---
apiVersion: v1
kind: Service
metadata:
  name: notification-service
  namespace: bankforge
spec:
  selector:
    app: notification-service
  ports:
    - port: 8080
      targetPort: 8080
