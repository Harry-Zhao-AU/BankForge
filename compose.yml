name: bankforge

services:

  # ─── Databases ──────────────────────────────────────────────────────────────

  account-db:
    image: postgres:17-alpine
    environment:
      POSTGRES_DB: accountdb
      POSTGRES_USER: account
      POSTGRES_PASSWORD: secret
    command:
      - "postgres"
      - "-c"
      - "wal_level=logical"
      - "-c"
      - "max_replication_slots=5"
      - "-c"
      - "max_wal_senders=5"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U account -d accountdb"]
      interval: 5s
      timeout: 5s
      retries: 10
    ports:
      - "5432:5432"

  payment-db:
    image: postgres:17-alpine
    environment:
      POSTGRES_DB: paymentdb
      POSTGRES_USER: payment
      POSTGRES_PASSWORD: secret
    command:
      - "postgres"
      - "-c"
      - "wal_level=logical"
      - "-c"
      - "max_replication_slots=5"
      - "-c"
      - "max_wal_senders=5"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U payment -d paymentdb"]
      interval: 5s
      timeout: 5s
      retries: 10
    ports:
      - "5433:5432"

  ledger-db:
    image: postgres:17-alpine
    environment:
      POSTGRES_DB: ledgerdb
      POSTGRES_USER: ledger
      POSTGRES_PASSWORD: secret
    command:
      - "postgres"
      - "-c"
      - "wal_level=logical"
      - "-c"
      - "max_replication_slots=5"
      - "-c"
      - "max_wal_senders=5"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ledger -d ledgerdb"]
      interval: 5s
      timeout: 5s
      retries: 10
    ports:
      - "5434:5432"

  notification-db:
    image: postgres:17-alpine
    environment:
      POSTGRES_DB: notificationdb
      POSTGRES_USER: notification
      POSTGRES_PASSWORD: secret
    command:
      - "postgres"
      - "-c"
      - "wal_level=logical"
      - "-c"
      - "max_replication_slots=5"
      - "-c"
      - "max_wal_senders=5"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U notification -d notificationdb"]
      interval: 5s
      timeout: 5s
      retries: 10
    ports:
      - "5435:5432"

  redis:
    image: redis:7.2-alpine
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    ports:
      - "6379:6379"

  # ─── Services ────────────────────────────────────────────────────────────────

  account-service:
    build:
      context: ./account-service
    depends_on:
      account-db:
        condition: service_healthy
    ports:
      - "8081:8080"
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://account-db:5432/accountdb
      SPRING_DATASOURCE_USERNAME: account
      SPRING_DATASOURCE_PASSWORD: secret

  payment-service:
    build:
      context: ./payment-service
    depends_on:
      payment-db:
        condition: service_healthy
      redis:
        condition: service_healthy
    ports:
      - "8082:8080"
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://payment-db:5432/paymentdb
      SPRING_DATASOURCE_USERNAME: payment
      SPRING_DATASOURCE_PASSWORD: secret
      SPRING_DATA_REDIS_HOST: redis
      SERVICES_ACCOUNT_BASE_URL: http://account-service:8080

  ledger-service:
    build:
      context: ./ledger-service
    depends_on:
      ledger-db:
        condition: service_healthy
    ports:
      - "8083:8080"
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://ledger-db:5432/ledgerdb
      SPRING_DATASOURCE_USERNAME: ledger
      SPRING_DATASOURCE_PASSWORD: secret

  notification-service:
    build:
      context: ./notification-service
    # No DB dependency in Phase 1 — notification-service is a stub
    # Kafka consumer wired in Phase 1.1
    ports:
      - "8084:8080"
