spring:
  datasource:
    # URL/username/password overridden at runtime by @DynamicPropertySource in each test class
    # (Testcontainers PostgreSQL container mapped port)
    url: jdbc:postgresql://localhost:5432/paymentdb
    username: payment
    password: secret
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: validate
  flyway:
    enabled: true
    locations: classpath:db/migration
  data:
    redis:
      # host/port overridden at runtime by @DynamicPropertySource in each test class
      # (Testcontainers Redis container mapped port)
      host: localhost
      port: 6379

services:
  account:
    base-url: http://localhost:9999
