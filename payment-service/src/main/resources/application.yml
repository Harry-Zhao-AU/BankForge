spring:
  application:
    name: payment-service
  threads:
    virtual:
      enabled: true
  datasource:
    url: jdbc:postgresql://localhost:5433/paymentdb
    username: payment
    password: secret
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: false
  data:
    redis:
      host: localhost
      port: 6379
  kafka:
    bootstrap-servers: ${SPRING_KAFKA_BOOTSTRAP_SERVERS:localhost:29092}
    consumer:
      group-id: payment-service
      auto-offset-reset: earliest
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.apache.kafka.common.serialization.StringDeserializer
    listener:
      observation-enabled: true
    template:
      observation-enabled: true

services:
  account:
    base-url: http://localhost:8081

server:
  port: 8080

management:
  tracing:
    sampling:
      probability: 1.0
  otlp:
    metrics:
      export:
        url: ${OTEL_EXPORTER_OTLP_ENDPOINT:http://localhost:4318}/v1/metrics
  opentelemetry:
    logging:
      export:
        otlp:
          endpoint: ${OTEL_EXPORTER_OTLP_ENDPOINT:http://localhost:4318}/v1/logs
    tracing:
      export:
        otlp:
          endpoint: ${OTEL_EXPORTER_OTLP_ENDPOINT:http://localhost:4318}/v1/traces

resilience4j:
  circuitbreaker:
    instances:
      accountServiceExecute:
        slidingWindowSize: 10
        minimumNumberOfCalls: 5
        failureRateThreshold: 50
        slowCallDurationThreshold: PT5S
        slowCallRateThreshold: 50
        waitDurationInOpenState: PT30S
        permittedNumberOfCallsInHalfOpenState: 3
        registerHealthIndicator: true
        # 4xx responses (e.g. InsufficientFunds) are business rejections, not infrastructure failures
        ignoreExceptions:
          - org.springframework.web.client.HttpClientErrorException
      accountServiceReverse:
        slidingWindowSize: 10
        minimumNumberOfCalls: 3
        failureRateThreshold: 50
        slowCallDurationThreshold: PT5S
        slowCallRateThreshold: 50
        waitDurationInOpenState: PT30S
        permittedNumberOfCallsInHalfOpenState: 2
        registerHealthIndicator: true
        ignoreExceptions:
          - org.springframework.web.client.HttpClientErrorException

logging:
  structured:
    format:
      console: ecs
